<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>FourCore Breadcrumbs - Shopline App</title>
    <style>
      :root {
        --bg: #f4f6f8;
        --card: #ffffff;
        --text: #1f2937;
        --muted: #4b5563;
        --accent: #0f766e;
      }

      body {
        margin: 0;
        font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
        background: linear-gradient(135deg, #f8fafc 0%, #ecfeff 100%);
        color: var(--text);
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 24px;
      }

      .card {
        background: var(--card);
        border: 1px solid #e5e7eb;
        border-radius: 14px;
        width: min(760px, 100%);
        padding: 28px;
        box-shadow: 0 10px 30px rgba(2, 6, 23, 0.08);
      }

      h1 {
        margin: 0 0 8px;
        font-size: 1.6rem;
      }

      p {
        margin: 8px 0;
        line-height: 1.5;
        color: var(--muted);
      }

      code {
        background: #f1f5f9;
        padding: 2px 6px;
        border-radius: 6px;
      }

      a {
        color: var(--accent);
        text-decoration: none;
      }

      a:hover {
        text-decoration: underline;
      }
    </style>
  </head>
  <body>
    <main class="card">
      <h1>FourCore Breadcrumbs (Shopline)</h1>
      <p>This Netlify site is live and ready for SHOPLINE app configuration.</p>
      <p>
        Recommended callback URL:
        <code>/auth/callback</code>
      </p>
      <p>
        Health check:
        <a href="/.netlify/functions/health">/.netlify/functions/health</a>
      </p>
      <p>
        OAuth callback test:
        <a href="/auth/callback?code=test&shop=test-shop">/auth/callback?code=test&amp;shop=test-shop</a>
      </p>
    </main>
  </body>
</html>
